<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Login
    </title>

    <link rel="stylesheet"
          href="css/auth.css">

</head>

<body>

<div class="auth-container">

    <form
        class="auth-card"
        id="loginForm">

        <h1>Login</h1>

        <input
            type="email"
            id="email"
            placeholder="Email"
            required>

        <input
            type="password"
            id="password"
            placeholder="Password"
            required>

        <button type="submit">

            Login

        </button>

        <a href="forgot-password.html">

            Forgot Password?

        </a>

        <p>

            Don't have an account?

            <a href="signup.html">
                Sign Up
            </a>

        </p>

    </form>

</div>

<script src="js/utils.js"></script>

<script src="js/login.js"></script>

<div id="toastContainer"></div>

</body>

</html>
