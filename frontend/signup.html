<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<title>
    Sign Up
</title>

<link rel="stylesheet"
      href="css/auth.css">

</head>

<body>

<div class="auth-container">

<form
    class="auth-card"
    id="signupForm">

<h1>Create Account</h1>

<input
       type="email"
       id="email"
       placeholder="Email"
       required>

<input
       type="password"
       id="password"
       placeholder="Password"
       required>

<button type="submit">

    Sign Up

</button>

<p>

Already have an account?

<a href="login.html">

Login

</a>

</p>

</form>

</div>

<script src="js/utils.js"></script>

<script src="js/signup.js"></script>

<div id="toastContainer"></div>

</body>

</html>
